<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌宠时光 - 宠物档案</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #FF9A76;
            --primary-light: #FFD4C4;
            --primary-dark: #FF7B54;
            --secondary: #A8E6CF;
            --secondary-light: #DCFAF0;
            --accent: #FFD93D;
            --bg-cream: #FFFBF7;
            --bg-white: #FFFFFF;
            --text-dark: #4A4A4A;
            --text-medium: #7A7A7A;
            --text-light: #AAAAAA;
            --shadow-soft: 0 8px 32px rgba(255, 154, 118, 0.15);
            --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.08);
            --radius-sm: 16px;
            --radius-md: 24px;
            --radius-lg: 32px;
            --radius-xl: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'ZCOOL KuaiLe', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, var(--bg-cream) 0%, #FFF5EE 100%);
            color: var(--text-dark);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 154, 118, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(168, 230, 207, 0.15) 0%, transparent 25%);
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-white);
            position: relative;
            box-shadow: 0 0 80px rgba(255, 154, 118, 0.2);
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
            overflow: hidden;
        }

        /* 卡通头部 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -30px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            font-family: 'ZCOOL KuaiLe', cursive;
            letter-spacing: 1px;
        }

        .edit-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* 宠物档案卡片 */
        .profile-card {
            background: white;
            margin: -40px 16px 20px;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-soft);
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .pet-avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid var(--primary-light);
            object-fit: cover;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(255, 154, 118, 0.3);
        }

        .pet-name {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .pet-breed {
            font-size: 16px;
            color: var(--text-medium);
            margin-bottom: 16px;
        }

        .pet-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge.gender-male {
            background: #E3F2FD;
            color: #1976D2;
        }

        .badge.age {
            background: #FFF3E0;
            color: #F57C00;
        }

        .badge.weight {
            background: #E8F5E9;
            color: #388E3C;
        }

        /* 信息网格 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-item {
            background: var(--bg-cream);
            padding: 16px;
            border-radius: var(--radius-md);
            text-align: left;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* 统计卡片 */
        .stats-section {
            padding: 0 16px 20px;
        }

        .stats-card {
            background: linear-gradient(135deg, var(--secondary-light) 0%, var(--secondary) 100%);
            border-radius: var(--radius-lg);
            padding: 24px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .stats-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        /* 功能列表 */
        .menu-section {
            padding: 0 16px 100px;
        }

        .menu-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-dark);
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .menu-list {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: var(--bg-cream);
        }

        .menu-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
        }

        .menu-item:nth-child(1) .menu-icon { background: #FFE5E5; }
        .menu-item:nth-child(2) .menu-icon { background: #E5F3FF; }
        .menu-item:nth-child(3) .menu-icon { background: #FFF9E5; }
        .menu-item:nth-child(4) .menu-icon { background: #E8F5E9; }
        .menu-item:nth-child(5) .menu-icon { background: #F3E5F5; }

        .menu-content {
            flex: 1;
        }

        .menu-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .menu-desc {
            font-size: 13px;
            color: var(--text-light);
        }

        .menu-arrow {
            font-size: 20px;
            color: var(--text-light);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            border-top: 2px solid var(--primary-light);
            padding: 12px 20px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        .nav-item.active {
            color: var(--primary);
            transform: translateY(-4px);
        }

        .nav-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .nav-item.active .nav-icon {
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(255, 154, 118, 0.3);
        }

        .nav-text {
            font-size: 12px;
            font-weight: 700;
        }

        .nav-add {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -32px;
            box-shadow: 0 8px 24px rgba(255, 154, 118, 0.4);
            cursor: pointer;
            border: 4px solid white;
            transition: all 0.3s ease;
        }

        .nav-add:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* 装饰元素 */
        .decoration-paw {
            position: fixed;
            opacity: 0.1;
            font-size: 60px;
            pointer-events: none;
        }

        .paw-1 { top: 100px; right: 20px; transform: rotate(20deg); }
        .paw-2 { bottom: 150px; left: 20px; transform: rotate(-15deg); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <button class="back-btn">←</button>
                <h1 class="header-title">宠物档案</h1>
                <button class="edit-btn">✏️</button>
            </div>
        </header>

        <!-- 宠物资料卡片 -->
        <div class="profile-card">
            <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=300&h=300&fit=crop" alt="旺财" class="pet-avatar-large">
            <h2 class="pet-name">旺财 🐕</h2>
            <p class="pet-breed">金毛寻回犬 · 2岁3个月</p>
            
            <div class="pet-badges">
                <span class="badge gender-male">♂️ 男孩</span>
                <span class="badge age">🎂 2023.01.15</span>
                <span class="badge weight">⚖️ 12.5kg</span>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">芯片编号</div>
                    <div class="info-value">#20230115001</div>
                </div>
                <div class="info-item">
                    <div class="info-label">绝育状态</div>
                    <div class="info-value">已绝育 ✅</div>
                </div>
                <div class="info-item">
                    <div class="info-label">血型</div>
                    <div class="info-value">DEA 1.1+</div>
                </div>
                <div class="info-item">
                    <div class="info-label">性格标签</div>
                    <div class="info-value">活泼·亲人</div>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-section">
            <div class="stats-card">
                <h3 class="stats-title">📊 成长数据</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number">156</div>
                        <div class="stat-label">日记篇数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">48</div>
                        <div class="stat-label">照片数量</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">12</div>
                        <div class="stat-label">健康记录</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 功能菜单 -->
        <div class="menu-section">
            <h3 class="menu-title">🎯 快捷功能</h3>
            
            <div class="menu-list">
                <div class="menu-item">
                    <div class="menu-icon">💉</div>
                    <div class="menu-content">
                        <div class="menu-label">疫苗记录</div>
                        <div class="menu-desc">下次接种：2026-04-15</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>

                <div class="menu-item">
                    <div class="menu-icon">🐛</div>
                    <div class="menu-content">
                        <div class="menu-label">驱虫记录</div>
                        <div class="menu-desc">上次驱虫：2026-03-01</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>

                <div class="menu-item">
                    <div class="menu-icon">⚖️</div>
                    <div class="menu-content">
                        <div class="menu-label">体重追踪</div>
                        <div class="menu-desc">当前：12.5kg · 较上月+0.3kg</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>

                <div class="menu-item">
                    <div class="menu-icon">🏥</div>
                    <div class="menu-content">
                        <div class="menu-label">病历档案</div>
                        <div class="menu-desc">最近就诊：2026-02-20</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>

                <div class="menu-item">
                    <div class="menu-icon">📅</div>
                    <div class="menu-content">
                        <div class="menu-label">日常提醒</div>
                        <div class="menu-desc">今日待办：2项</div>
                    </div>
                    <span class="menu-arrow">→</span>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <button class="nav-item">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">首页</span>
            </button>
            <button class="nav-item">
                <span class="nav-icon">📖</span>
                <span class="nav-text">日记</span>
            </button>
            <button class="nav-add">+</button>
            <button class="nav-item active">
                <span class="nav-icon">🐾</span>
                <span class="nav-text">档案</span>
            </button>
            <button class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-text">我的</span>
            </button>
        </nav>
    </div>

    <!-- 装饰 -->
    <div class="decoration-paw paw-1">🐾</div>
    <div class="decoration-paw paw-2">🐾</div>
</body>
</html>
